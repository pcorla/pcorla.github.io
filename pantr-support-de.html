<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Support & Datenschutz</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            width: 90%;
            background-color: #ffffff;
            border-radius: 18px;
            padding: 40px 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; color: #000000; }
        p { font-size: 15px; line-height: 1.6; color: #515154; margin-bottom: 25px; }
        .btn {
            display: inline-block;
            background-color: #0071e3;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 26px;
            border-radius: 22px;
            font-size: 15px;
            font-weight: 500;
            transition: background-color 0.2s ease;
        }
        .btn:hover { background-color: #0077ed; }
        .email-text { display: block; margin-top: 15px; font-size: 13px; color: #86868b; }
        footer { margin-top: 40px; font-size: 14px; }
        footer a { color: #0071e3; text-decoration: none; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hi, ich bin Philip! 👋</h1>
        <p>Schön, dass du meine App nutzt. Wenn du Fragen hast, einen Fehler gefunden hast oder Feedback teilen möchtest, schreib mir einfach eine kurze Nachricht.</p>

        <a href="mailto:philip.corlatan@gmail.com?subject=Frage%20zu%20deiner%20App" class="btn">Schreib mir eine E-Mail</a>

        <span class="email-text">Direktadresse:<br><strong>philip.corlatan@gmail.com</strong></span>
    </div>

    <footer>
        <a href="pantr-privacy-de.html">Datenschutzerklärung (Privacy Policy)</a>
    </footer>

</body>
</html>
